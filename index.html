<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>派遣売上シミュレーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="root">
        <div class="flex items-center justify-center h-screen text-slate-400">読み込み中...</div>
    </div>

    <script>
        // ブラウザが直接理解できる形式（翻訳不要）にしました
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ComposedChart, Line, Legend } = Recharts;

        function App() {
            const [p, setP] = useState({ initialUsers: 530, price: 280000, churn: 0.055, newUsers: 33, months: 12 });

            const data = useMemo(() => {
                let monthlyData = [];
                let currentUsers = p.initialUsers;
                for (let i = 1; i <= p.months; i++) {
                    currentUsers = (currentUsers + p.newUsers) * (1 - p.churn);
                    monthlyData.push({ name: i + 'ヶ月', 稼働数: Math.round(currentUsers), 売上: Math.round(currentUsers * p.price) });
                }
                return monthlyData;
            }, [p]);

            return React.createElement('div', { className: 'max-w-6xl mx-auto p-4 md:p-10 space-y-6' },
                React.createElement('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border border-slate-200' },
                    React.createElement('h1', { className: 'text-2xl font-bold' }, '📊 派遣売上シミュレーション'),
                    React.createElement('p', { className: 'text-sm text-slate-400 mt-1' }, 'URLで誰にでも共有可能な正式版')
                ),
                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-4 gap-6' },
                    React.createElement('div', { className: 'lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4' },
                        React.createElement('h2', { className: 'font-bold border-b pb-2' }, '条件設定'),
                        ['initialUsers', 'price', 'newUsers'].map(key => 
                            React.createElement('div', { key },
                                React.createElement('label', { className: 'block text-xs text-slate-400 mb-1' }, key),
                                React.createElement('input', {
                                    type: 'number',
                                    value: p[key],
                                    onChange: e => setP({ ...p, [key]: Number(e.target.value) }),
                                    className: 'w-full p-2 bg-slate-50 border rounded-lg text-right font-mono'
                                })
                            )
                        )
                    ),
                    React.createElement('div', { className: 'lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200' },
                        React.createElement('div', { className: 'h-80 w-full' },
                            React.createElement(ResponsiveContainer, null,
                                React.createElement(ComposedChart, { data: data },
                                    React.createElement(CartesianGrid, { strokeDasharray: '3 3', vertical: false, stroke: '#f0f0f0' }),
                                    React.createElement(XAxis, { dataKey: 'name' }),
                                    React.createElement(YAxis, { width: 80 }),
                                    React.createElement(Tooltip, null),
                                    React.createElement(Legend, null),
                                    React.createElement(Bar, { dataKey: '売上', fill: '#3b82f6', radius: [4, 4, 0, 0] }),
                                    React.createElement(Line, { type: 'monotone', dataKey: '稼働数', stroke: '#f43f5e', strokeWidth: 3 })
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
